<div class="p-4">
  <div class="flex justify-between items-center mb-4">
    <button (click)="goToToday()" class="bg-blue-700 text-white px-4 py-2 rounded">Today</button>
    <div>
      <button (click)="prevMonth()" class="px-4 py-2">Prev</button>
      <button (click)="nextMonth()" class="px-4 py-2">Next</button>
    </div>
  </div>
  <div class="grid grid-cols-7 gap-2">
    <div *ngFor="let day of days" class="text-center font-bold">{{ day }}</div>
    <div *ngFor="let date of dates" class="text-center p-2 border rounded-full cursor-pointer"
         [ngClass]="{'bg-blue-200': isToday(date), 'bg-green-200': isSelected(date)}"
         (click)="openPopup(date)">
      {{ date.getDate() }}
      <div *ngIf="hasEvent(date)" class="mt-1 text-xs text-white rounded-full px-2 py-1" [ngStyle]="{'background-color': getEventColor(date)}">
        <span (click)="editEvent(date)">{{ getEventName(date) }}</span>
      </div>
    </div>
  </div>
  <lib-event-popup *ngIf="showPopup" [event]="selectedEvent" (close)="closePopup()" (save)="saveEvent($event)"></lib-event-popup>
</div>
